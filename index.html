<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1ea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tiny Universe</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="universe" aria-label="Tiny Universe"></canvas>

    <div id="chrome" class="chrome">
      <div class="badge">
        <span class="dot"></span>
        <span id="systemName">Tiny Universe</span>
      </div>

      <button id="resetBtn" class="icon-btn" aria-label="Réinitialiser l’univers" title="Réinitialiser l’univers">⟲</button>

      <div id="speedBox" class="speed-box" aria-label="Vitesse du temps">
        <span class="speed-label">temps</span>
        <div class="speed-track"><div id="speedFill" class="speed-fill"></div></div>
      </div>

      <div id="volumeBox" class="volume-box" aria-label="Volume ambiant">
        <span class="volume-label">audio</span>
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.28" />
      </div>
    </div>

    <div id="chronicle" class="chronicle" aria-live="polite"></div>
    <div id="hint" class="hint">Glisse à droite pour accélérer · à gauche pour ralentir · tape pour troubler l’espace</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
